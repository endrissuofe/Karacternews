# CI (CLAUDE.md §3.10): lint + typecheck + production build on every PR/push
# to main. Build needs a live Postgres because Next prerenders through
# Payload — provided here as a service container with migrations applied.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: karacter
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: karacter
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U karacter"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgres://karacter:ci@127.0.0.1:5432/karacter
      PAYLOAD_SECRET: ci-only-secret-not-used-in-prod
      NEXT_PUBLIC_SERVER_URL: http://localhost:3000
      CRON_SECRET: ci-only
      PREVIEW_SECRET: ci-only

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Run migrations
        run: pnpm payload migrate

      - name: Build
        run: pnpm build
